extends:
  # The default-with-font-fallbacks is a builtin theme.
  - default-with-font-fallbacks

font:
  catalog:
    merge: true
    RedHatText:
      normal: RedHatText-Regular.ttf
      bold: RedHatText-Bold.ttf
      italic: RedHatText-Italic.ttf
      bold_italic: RedHatText-BoldItalic.ttf

page:
  margin: [25mm, 17mm, 28mm, 17mm]

base:
  text-align: justify
  font-family: RedHatText
  font-size: 8.5

role:
  example:
    font-color: #D3D3D3
    font-style: italic
  red-text:
    background-color: #ee0000
  lime-text:
    background-color: #00fa00
  aqua-text:
    background-color: #00fafa
  blue-text:
    background-color: #0000fa
  fuchsia-text:
    background-color: #fa00fa
  gray-text:
    background-color: #7d7d7d
  green-text:
    background-color: #007d00
  maroon-text:
    background-color: #7d0000
  navy-text:
    background-color: #00007d
  olive-text:
    background-color: #7d7d00
  purple-text:
    background-color: #7d007d
  silver-text:
    background-color: #bcbcbc
  teal-text:
    background-color: #007d7d
  white-text:
    background-color: #fafafa
  black-text:
    background-color: #000

caption:
  align: center

title-page:
  text-align: left
  background-image: image:redhatConsulting.png[]
  title:
    top: 60%
  logo:
    top: 20vh

header:
  height: 19mm
  border-color: #B7B7B7
  recto:
    left:
       content: image:Logo-Red_Hat-Consulting-A-Standard-RGB.png[width=80]
    center:
       content:
    right:
       content: |
                 {docstatus}
  verso:
    left:
       content: image:Logo-Red_Hat-Consulting-A-Standard-RGB.png[width=80]
    center:
       content:
    right:
       content: |
                 {docstatus}

footer:
  height: 19mm
  recto:
    left:
      content: |
                {customer} +
                {confidentiality}
    center:
      content: |
                {document-title} +
                {description}
    right:
      content: |
                {page-number} +
                v{revnumber}
  verso:
    left:
      content: |
                {customer} +
                {confidentiality}
    center:
      content: |
                {document-title} +
                {description}
    right:
      content: |
                {page-number} +
                v{revnumber}

table:
  font-size: 7
  head:
    font-size: 7
    background-color: #CCCCCC
  body:
    stripe-background-color: #EFEFEF

code:
  background-color: #2D2D2D
  font-color: #CCCCCC
  font-family: Courier
  font-size: 6
  border-radius: 0
  padding: [8, 10, 8, 10]
  border-width: 0
  border-color: #2D2D2D
  line-height: 1.3

image:
  align: center

admonition:
  font-size: 7
  label:
    font-size: 7
    font-style: bold
  padding: [6, 8, 6, 8]

heading-h1:
  font-size: 19
heading-h2:
  font-size: 15.2
heading-h3:
  font-size: 12.8
heading-h4:
  font-size: 11.4
heading-h5:
  font-size: 10.4
heading-h6:
  font-size: 10
heading-h7:
  font-size: 9.5
heading-h8:
  font-size: 9.5
heading-h9:
  font-size: 9.5

